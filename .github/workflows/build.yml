name: Build OpenWrt Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd

      - name: 下载 OpenWrt SDK (snapshot)
        run: |
          wget -q "https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst" -O /tmp/sdk.tar.zst
          mkdir /tmp/sdk
          tar --zstd -xf /tmp/sdk.tar.zst -C /tmp/sdk --strip-components=1

      - name: 添加软件包到 SDK
        run: |
          cp -r ${{ github.workspace }} /tmp/sdk/package/luci-app-fzu-network

      - name: 编译软件包
        working-directory: /tmp/sdk
        run: |
          make defconfig
          make package/luci-app-fzu-network/compile V=s -j$(nproc)

      - name: 收集产物
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          find /tmp/sdk/bin -name "luci-app-fzu-network*.apk" -exec cp {} ${{ github.workspace }}/artifacts/ \;
          ls -lh ${{ github.workspace }}/artifacts/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fzu-network-apk
          path: artifacts/*.apk

  build-ipk:
    name: Build IPK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev \
            gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: 下载 OpenWrt SDK (23.05)
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O /tmp/sdk.tar.xz
          mkdir /tmp/sdk-ipk
          tar -xf /tmp/sdk.tar.xz -C /tmp/sdk-ipk --strip-components=1

      - name: 添加软件包到 SDK
        run: |
          cp -r ${{ github.workspace }} /tmp/sdk-ipk/package/luci-app-fzu-network

      - name: 编译软件包
        working-directory: /tmp/sdk-ipk
        run: |
          make defconfig
          make package/luci-app-fzu-network/compile V=s -j$(nproc)

      - name: 收集产物
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          find /tmp/sdk-ipk/bin -name "luci-app-fzu-network*.ipk" -exec cp {} ${{ github.workspace }}/artifacts/ \;
          ls -lh ${{ github.workspace }}/artifacts/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-fzu-network-ipk
          path: artifacts/*.ipk

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-ipk]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: luci-app-fzu-network ${{ github.ref_name }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.ipk
          generate_release_notes: true